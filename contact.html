<!-- TITRE -->
<div class="container text-center my-5">
  <h1>Contactez-nous</h1>
  <p>Envoyez-nous un message</p>
</div>

<!-- SECTION CONTACT -->
<div class="container mb-5">
  <div class="row">

    <!-- FORMULAIRE -->
    <div class="col-md-7">
      <form>

        <!-- NOM -->
        <div class="mb-3">
          <label class="form-label">Nom</label>
          <input type="text" class="form-control" required minlength="2">
        </div>

        <!-- EMAIL -->
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" required>
        </div>

        <!-- SUJET -->
        <div class="mb-3">
          <label class="form-label">Sujet</label>
          <select class="form-control" required>
            <option value="">Choisir un sujet</option>
            <option>Commande</option>
            <option>Réservation</option>
            <option>Information</option>
            <option>Autre</option>
          </select>
        </div>

        <!-- TELEPHONE -->
        <div class="mb-3">
          <label class="form-label">Téléphone</label>
          <input type="tel" class="form-control">
        </div>

        <!-- MESSAGE -->
        <div class="mb-3">
          <label class="form-label">Message</label>
          <textarea class="form-control" rows="4" required minlength="20"></textarea>
        </div>

        <!-- CHECKBOX -->
        <div class="form-check mb-3">
          <input type="checkbox" class="form-check-input" required>
          <label class="form-check-label">J'accepte les conditions</label>
        </div>

        <!-- BUTTON -->
        <button type="submit" class="btn btn-primary w-100">
          Envoyer
        </button>

      </form>
    </div>

    <!-- INFOS -->
    <div class="col-md-5">
      <h3>Nos coordonnées</h3>
      <p><strong>Adresse :</strong> Dakar, Sénégal</p>
      <p><strong>Téléphone :</strong> +221 77 643 65 06</p>
      <p><strong>Email :</strong> ndao54448gmail.com</p>

    
    </div>

  </div>
</div>
